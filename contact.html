<html lang="en">
<head>

</head>
<body>

    <!-- Floating Buttons -->
    <div class="floating-btns">
        <a href="tel:+13054094338" class="float-btn call-float" title="Call Us">
            <i class="fas fa-phone"></i>

        <a href="https://wa.me/13054094338" target="_blank" class="float-btn wa-float" title="WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <!-- Navigation -->
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">Marea<span> Nails</span></a>
            <div class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="services.html" class="nav-link">Services</a></li>
                <li><a href="contact.html" class="nav-link active">Contact</a></li>
            </ul>
        </div>
    </header>

    <!-- Inner Hero -->
    <section class="mini-hero">
        <div class="container hero-content">
            <h1>Book an Appointment</h1>
            <p>Visit us at 7373 SW 8th St, Miami</p>
        </div>
    </section>

    <!-- Contact Details -->
    <section class="contact-details">
        <div class="container">
            <div class="service-grid">
                <div class="service-card">
                    <h3><i class="fas fa-map-marker-alt"></i> Visit Us</h3>
                    <p>7373 SW 8th St,<br>Miami, FL 33144</p>
                    <a href="https://www.google.com/maps/place/Marea+Nail+Salon" target="_blank" class="btn-sm">Get Directions</a>
                </div>
                <div class="service-card">
                    <h3><i class="fas fa-clock"></i> Hours</h3>
                    <p>Tue - Sat: 9am - 6pm<br>Mon & Sun: Closed</p>
                </div>
                <div class="service-card">
                    <h3><i class="fas fa-phone"></i> Contact</h3>
                    <p>Call or WhatsApp us!</p>
                    <p class="phone-num">+1 305-409-4338</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Booking Form -->
    <section class="form-section">
        <div class="container">
            <div class="contact-form-wrapper">
                <h2 class="section-title">Request Booking</h2>
                <form class="booking-form" action="#" method="POST" onsubmit="return handleSubmit(event)">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required placeholder="+1 (305) 000-0000">
                    </div>
                    <div class="form-group">
                        <label for="service-select">Service</label>
                        <select id="service-select" name="service" required>
                            <option value="" disabled selected>Select Service</option>
                            <option value="manicure">Classic Manicure ($25)</option>
                            <option value="gel-mani">Gel Manicure ($40)</option>
                            <option value="pedicure">Spa Pedicure ($45)</option>
                            <option value="acrylic">Acrylic Full Set ($65)</option>
                            <option value="sns">Gel Powder / SNS ($55)</option>
                            <option value="nail-art">Nail Art (+$5)</option>
                        </select>
                    </div>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" name="date" required>
                        </div>
                        <div class="form-group">
                            <label for="time">Time</label>
                            <select id="time" name="time" required>
                                <option value="09:00">9:00 AM</option>
                                <option value="10:00">10:00 AM</option>
                                <option value="11:00">11:00 AM</option>
                                <option value="12:00">
